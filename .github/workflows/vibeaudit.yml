name: VibeAudit

on:
  push:
    branches:
      - '**'

jobs:
  vibeaudit:
    name: vibeaudit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install VibeAudit
        run: npm install -g @lmhansen/vibeaudit

      - name: Run VibeAudit
        uses: ./
        with:
          path: '.'
